# Configuración de análisis para SonarCloud (proyecto GEO-Audit)
sonar.projectKey=angelmanuelferrer_TFG
sonar.organization=angelmanuelferrer1023
sonar.projectName=GEO-Audit

# Código analizado: pipeline de investigación, backend y frontend
sonar.sources=src,backend/app,frontend/src,collect_metrics,scripts
sonar.tests=backend/tests,frontend/src/test,tests
sonar.test.inclusions=backend/tests/**,frontend/src/test/**,tests/**

# Exclusiones: componentes de interfaz generados por shadcn/ui
sonar.exclusions=frontend/src/components/ui/**,**/__pycache__/**

# Cobertura: se mide sobre el código con lógica determinista comprobable.
# - Los módulos de orquestación de red/LLM (discovery, juez RAG, crawler,
#   embeddings, optimizador, colectores) se validan funcionalmente mediante el
#   protocolo experimental (cap. 6 de la memoria), no con suite unitaria.
# - Las páginas y componentes de visualización del frontend son composición
#   declarativa de UI; se validan con build, ESLint y las pruebas de interfaz
#   de los componentes compartidos (que sí computan cobertura).
sonar.coverage.exclusions=scripts/**,collect_metrics/**,\
src/discovery/**,src/optimizer/**,src/rag/judge.py,src/rag/search_tool.py,\
src/processing/site_crawler.py,src/processing/embeddings.py,src/processing/html_processor.py,\
frontend/src/pages/**,frontend/src/components/experimental/**,frontend/src/components/live/**,\
frontend/src/components/seo/**,frontend/src/components/AppHeader.tsx,frontend/src/components/AppSidebar.tsx,\
frontend/src/components/DashboardLayout.tsx,frontend/src/components/KpiCard.tsx,\
frontend/src/components/NavLink.tsx,frontend/src/components/PlaceholderPage.tsx

sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml,coverage-core.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8
