# Configuración de análisis para SonarCloud (proyecto GEO-Audit)
sonar.projectKey=angelmanuelferrer_TFG
sonar.organization=angelmanuelferrer
sonar.projectName=GEO-Audit

# Código analizado: pipeline de investigación, backend y frontend
sonar.sources=src,backend/app,frontend/src,collect_metrics,scripts
sonar.tests=backend/tests,frontend/src/test
sonar.test.inclusions=backend/tests/**,frontend/src/test/**

# Exclusiones: componentes generados por shadcn/ui y mocks de desarrollo
sonar.exclusions=frontend/src/components/ui/**,**/__pycache__/**
sonar.coverage.exclusions=frontend/src/api/mock-*.ts,scripts/**,collect_metrics/**

sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8
